spring.application.name=auth-service

spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.issuer=auth-service
jwt.audience=your-application
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

refresh-token.cookie-name=refresh_token
refresh-token.cookie-path=/api/auth
refresh-token.cookie-max-age=604800
refresh-token.cookie-secure=true
refresh-token.cookie-same-site=None

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
