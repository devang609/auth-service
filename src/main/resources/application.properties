spring.application.name=auth-service

# Disable in prod -- or else Spring will expect .env inside container which is not a good practice
# spring.config.import=optional:file:./.env[.properties]



spring.profiles.active=${SPRING_PROFILES_ACTIVE}

spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT_MS}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS}

spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT}

jwt.private-key-path=${JWT_PRIVATE_KEY_PATH}
jwt.public-key-path=${JWT_PUBLIC_KEY_PATH}
jwt.issuer=${JWT_ISSUER}
jwt.audience=${JWT_AUDIENCE}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY_MS}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY_MS}

auth.allowed-roles=${AUTH_ALLOWED_ROLES}

refresh-token.cookie-name=${REFRESH_TOKEN_COOKIE_NAME}
refresh-token.cookie-path=${REFRESH_TOKEN_COOKIE_PATH}
refresh-token.cookie-max-age=${REFRESH_TOKEN_COOKIE_MAX_AGE}
refresh-token.cookie-secure=${REFRESH_TOKEN_COOKIE_SECURE}
refresh-token.cookie-same-site=${REFRESH_TOKEN_COOKIE_SAME_SITE}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

access-token.cookie-name=${ACCESS_TOKEN_COOKIE_NAME}
access-token.cookie-path=${ACCESS_TOKEN_COOKIE_PATH}
access-token.cookie-max-age=${ACCESS_TOKEN_COOKIE_MAX_AGE}
access-token.cookie-secure=${ACCESS_TOKEN_COOKIE_SECURE}
access-token.cookie-same-site=${ACCESS_TOKEN_COOKIE_SAME_SITE}