spring.config.activate.on-profile=test

spring.datasource.url=jdbc:h2:mem:auth_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=01234567890123456789012345678901
jwt.issuer=auth-service
jwt.audience=test
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

refresh-token.cookie-name=refresh_token
refresh-token.cookie-path=/api/auth
refresh-token.cookie-max-age=604800
refresh-token.cookie-secure=false
refresh-token.cookie-same-site=Lax

app.cors.allowed-origins=http://localhost:3000
